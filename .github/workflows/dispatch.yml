name: Dependency Update

# Auto-trigger disabled — Claude-driven CI. `repository_dispatch` from
# upstream fzt releases is ignored. Run manually via
# `gh workflow run dispatch.yml -R nelsong6/fzt-frontend` when ready
# to bump go.mod + cut release + cascade downstream.
on:
  workflow_dispatch:

# The called reusable workflow declares contents:write + actions:write.
# The template uses id-token:write for the Azure OIDC step that fetches the
# GitHub App credentials from Key Vault for the downstream dispatch.
permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  # Shared with release.yml so tag-cutting is serialized across dep-update
  # and direct-push release paths (prevents patch-number races).
  group: release-tag
  cancel-in-progress: false

jobs:
  update:
    uses: nelsong6/pipeline-templates/.github/workflows/go-dependency-update-template.yml@main
    with:
      modules: github.com/nelsong6/fzt
      # With dispatch-repos set, the template handles bump + commit + push +
      # cut release + notify consumers in one atomic job. Replaces the old
      # separate Tag + Dispatch workflow (removed).
      dispatch-repos: fzt-terminal,fzt-automate,fzt-browser,fzt-picker
      dispatch-event: fzt-updated
