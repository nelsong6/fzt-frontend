name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - packages/routes/**
      - Dockerfile
      - .dockerignore
      - k8s/**
      - .github/workflows/build-and-deploy.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  packages: read

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image, push, bump kustomization tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Build and push image
        run: |
          TAG="${GITHUB_SHA::7}"
          IMAGE="romainecr.azurecr.io/fzt-frontend:${TAG}"
          docker build --build-arg NPM_TOKEN=${{ secrets.GITHUB_TOKEN }} -t "$IMAGE" .
          docker push "$IMAGE"
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Install kustomize
        run: |
          curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump image tag in k8s/kustomization.yaml
        working-directory: k8s
        run: kustomize edit set image romainecr.azurecr.io/fzt-frontend=romainecr.azurecr.io/fzt-frontend:${{ env.TAG }}

      - name: Commit and push tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No kustomization changes to commit"
            exit 0
          fi
          git commit -m "chore: bump fzt-frontend image to ${{ env.TAG }} [skip ci]"
          git push
